<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
  <title>Super Mario World</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --red:#e52521; --yellow:#fbd000; --blue:#049cd8; --green:#43b047; --dark:#0a0a0a; --coin:#f7c948; }
    html, body { width:100%; height:100%; background:var(--dark); overflow:hidden; font-family:'Press Start 2P',monospace; touch-action:none; }

    /* SPLASH */
    #splash { position:fixed; inset:0; z-index:100; background:var(--dark); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:28px; transition:opacity .5s ease; }
    #splash.hide { opacity:0; pointer-events:none; }
    .logo { text-align:center; line-height:1.6; }
    .logo .super { font-size:clamp(10px,3vw,16px); color:var(--yellow); letter-spacing:.3em; text-shadow:3px 3px 0 #a07800; }
    .logo .mario { font-size:clamp(22px,7vw,52px); color:var(--red); text-shadow:4px 4px 0 #8b0000,8px 8px 0 #3a0000; display:block; animation:bounce 1s ease infinite alternate; }
    .logo .world { font-size:clamp(14px,4vw,28px); color:var(--blue); text-shadow:3px 3px 0 #025588; }
    @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-8px)} }
    .sprite { image-rendering:pixelated; width:64px; height:64px; }
    .coins { display:flex; gap:12px; }
    .coin { width:18px; height:18px; background:var(--coin); border-radius:50%; box-shadow:0 0 8px var(--coin); animation:coinSpin 1s linear infinite; }
    .coin:nth-child(2){animation-delay:.15s}.coin:nth-child(3){animation-delay:.3s}.coin:nth-child(4){animation-delay:.45s}.coin:nth-child(5){animation-delay:.6s}
    @keyframes coinSpin { 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(0.1)} }
    #startBtn { background:var(--green); color:#fff; border:none; font-family:'Press Start 2P',monospace; font-size:clamp(9px,2.5vw,13px); padding:14px 28px; cursor:pointer; text-shadow:2px 2px 0 #1a5c1a; box-shadow:0 6px 0 #1a5c1a,0 8px 16px rgba(0,0,0,.4); transition:transform .1s,box-shadow .1s; animation:pulse 1.5s ease infinite; }
    #startBtn:active { transform:translateY(4px); box-shadow:0 2px 0 #1a5c1a; }
    @keyframes pulse { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.2)} }

    /* EMULATOR */
    #emu-wrap { position:fixed; inset:0; display:none; background:#000; }
    #emu-wrap.active { display:block; }
    #game-container { width:100%; height:100%; position:relative; }

    /* Esconde controles nativos do EmulatorJS */
    [class*="ejs_gamepad"],[class*="ejs_virtualGamepad"],[class*="ejs_button_container"] { display:none !important; }

    /* SCANLINES */
    #emu-wrap::after { content:''; position:fixed; inset:0; pointer-events:none; z-index:10; background:repeating-linear-gradient(transparent 0px,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px); }

    /* ROTATE */
    #rotate-msg { display:none; position:fixed; inset:0; z-index:200; background:var(--dark); align-items:center; justify-content:center; flex-direction:column; gap:20px; text-align:center; }
    #rotate-msg .arrow { font-size:48px; animation:rotateArrow 1.5s ease infinite; }
    @keyframes rotateArrow { 0%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} 100%{transform:rotate(0deg)} }
    #rotate-msg p { color:var(--yellow); font-size:clamp(8px,2.5vw,11px); line-height:2; }
    @media (orientation:portrait) and (max-width:768px) { #rotate-msg{display:flex} }

    /* GAMEPAD OVERLAY */
    #gamepad { position:fixed; inset:0; z-index:50; pointer-events:none; display:none; }
    #gamepad.active { display:block; }

    /* DPAD */
    #dpad { position:absolute; bottom:20px; left:16px; width:144px; height:144px; pointer-events:none; }
    .dp { position:absolute; width:46px; height:46px; background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.22); border-radius:7px; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.65); font-size:17px; pointer-events:auto; touch-action:none; user-select:none; -webkit-user-select:none; transition:background .07s; }
    .dp.on { background:rgba(255,255,255,0.35); }
    #dp-u { top:0;    left:49px; }
    #dp-d { bottom:0; left:49px; }
    #dp-l { top:49px; left:0;   }
    #dp-r { top:49px; right:0;  }
    #dp-c { position:absolute; top:49px; left:49px; width:46px; height:46px; background:rgba(255,255,255,0.06); border-radius:5px; }

    /* FACE */
    #face { position:absolute; bottom:20px; right:16px; width:144px; height:144px; pointer-events:none; }
    .fb { position:absolute; width:48px; height:48px; border-radius:50%; border:2px solid; display:flex; align-items:center; justify-content:center; font-size:11px; font-family:'Press Start 2P',monospace; pointer-events:auto; touch-action:none; user-select:none; -webkit-user-select:none; transition:filter .07s; }
    .fb.on { filter:brightness(2); }
    #fb-y { top:0;    left:0;   background:rgba(80,80,220,.32);  color:#aaaaff; border-color:#6666ff; }
    #fb-x { top:0;    right:0;  background:rgba(220,180,50,.32); color:#ffee99; border-color:#ffdd55; }
    #fb-b { bottom:0; left:0;   background:rgba(220,50,50,.32);  color:#ff9999; border-color:#ff5566; }
    #fb-a { bottom:0; right:0;  background:rgba(50,180,50,.32);  color:#99ff99; border-color:#55ff66; }

    /* SHOULDERS */
    #shoulders { position:absolute; top:10px; left:0; right:0; display:flex; justify-content:space-between; padding:0 16px; pointer-events:none; }
    .sb { background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.2); border-radius:8px; color:rgba(255,255,255,0.7); font-family:'Press Start 2P',monospace; font-size:11px; padding:9px 20px; pointer-events:auto; touch-action:none; user-select:none; -webkit-user-select:none; transition:background .07s; }
    .sb.on { background:rgba(255,255,255,0.35); }

    /* CENTER */
    #center-btns { position:absolute; bottom:28px; left:50%; transform:translateX(-50%); display:flex; gap:10px; pointer-events:none; }
    .cb { background:rgba(255,255,255,0.11); border:2px solid rgba(255,255,255,0.18); border-radius:20px; color:rgba(255,255,255,0.65); font-family:'Press Start 2P',monospace; font-size:7px; padding:8px 11px; pointer-events:auto; touch-action:none; user-select:none; -webkit-user-select:none; transition:background .07s; }
    .cb.on { background:rgba(255,255,255,0.35); }
  </style>
</head>
<body>

<div id="splash">
  <div class="logo">
    <span class="super">SUPER</span>
    <span class="mario">MARIO</span>
    <span class="world">WORLD</span>
  </div>
  <svg class="sprite" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
    <rect x="5" y="0" width="6" height="2" fill="#e52521"/>
    <rect x="4" y="2" width="8" height="2" fill="#f4a460"/>
    <rect x="4" y="4" width="2" height="2" fill="#1a1a1a"/>
    <rect x="7" y="4" width="3" height="2" fill="#1a1a1a"/>
    <rect x="3" y="6" width="10" height="3" fill="#e52521"/>
    <rect x="3" y="6" width="4" height="2" fill="#f4a460"/>
    <rect x="5" y="9" width="6" height="2" fill="#f4a460"/>
    <rect x="4" y="11" width="3" height="2" fill="#3b2200"/>
    <rect x="9" y="11" width="3" height="2" fill="#3b2200"/>
    <rect x="3" y="13" width="4" height="3" fill="#3b2200"/>
    <rect x="9" y="13" width="4" height="3" fill="#3b2200"/>
  </svg>
  <div class="coins"><div class="coin"></div><div class="coin"></div><div class="coin"></div><div class="coin"></div><div class="coin"></div></div>
  <button id="startBtn" onclick="startGame()">▶ JOGAR AGORA</button>
</div>

<div id="rotate-msg">
  <div class="arrow">↻</div>
  <p>GIRE O CELULAR<br/>PARA LANDSCAPE<br/>PARA JOGAR</p>
</div>

<div id="emu-wrap">
  <div id="game-container"></div>
</div>

<div id="gamepad">
  <div id="shoulders">
    <div class="sb" data-btn="L">L</div>
    <div class="sb" data-btn="R">R</div>
  </div>
  <div id="dpad">
    <div id="dp-c"></div>
    <div class="dp" id="dp-u" data-btn="UP">▲</div>
    <div class="dp" id="dp-d" data-btn="DOWN">▼</div>
    <div class="dp" id="dp-l" data-btn="LEFT">◀</div>
    <div class="dp" id="dp-r" data-btn="RIGHT">▶</div>
  </div>
  <div id="face">
    <div class="fb" id="fb-y" data-btn="Y">Y</div>
    <div class="fb" id="fb-x" data-btn="X">X</div>
    <div class="fb" id="fb-b" data-btn="B">B</div>
    <div class="fb" id="fb-a" data-btn="A">A</div>
  </div>
  <div id="center-btns">
    <div class="cb" data-btn="SELECT">SEL</div>
    <div class="cb" data-btn="START">START</div>
  </div>
</div>

<script>
  const ROM_URL = "./Super Mario World (USA).sfc";

  // ── Índices RetroArch para SNES (EJS_GamepadMap) ──
  const BTN = { B:0, Y:9, SELECT:2, START:3, UP:4, DOWN:5, LEFT:6, RIGHT:7, A:8, X:1, L:10, R:11 };

  // Estado dos botões pressionados
  const pressed = {};

  let cachedGM = null;

  // Tenta cachear o gameManager assim que o jogo inicia
  window.EJS_onGameStart = function() {
    try {
      cachedGM = window.EJS_emulator && window.EJS_emulator.gameManager;
      console.log('[SMW] gameManager pronto:', !!cachedGM, '| simulateInput:', !!(cachedGM && cachedGM.simulateInput));
    } catch(e) { console.warn('[SMW] EJS_onGameStart erro:', e); }
  };

  function sendBtn(name, down) {
    if (!BTN.hasOwnProperty(name)) return;
    const idx = BTN[name];

    // Tenta pegar gameManager se ainda não tiver cacheado
    if (!cachedGM) {
      try { cachedGM = window.EJS_emulator && window.EJS_emulator.gameManager; } catch(e) {}
    }

    if (cachedGM && cachedGM.simulateInput) {
      try {
        cachedGM.simulateInput(0, idx, down ? 1 : 0);
        return;
      } catch(e) { console.warn('[SMW] simulateInput erro:', e); cachedGM = null; }
    }

    console.warn('[SMW] gameManager indisponível para botão:', name, idx);
  }

  // ── Bind touch/mouse em todos os botões ──
  function bindAll() {
    document.querySelectorAll('[data-btn]').forEach(el => {
      const name = el.dataset.btn;
      const activate   = e => { e.preventDefault(); e.stopPropagation(); el.classList.add('on');    sendBtn(name, true);  };
      const deactivate = e => { e.preventDefault(); e.stopPropagation(); el.classList.remove('on'); sendBtn(name, false); };
      el.addEventListener('touchstart',  activate,   {passive:false});
      el.addEventListener('touchend',    deactivate, {passive:false});
      el.addEventListener('touchcancel', deactivate, {passive:false});
      el.addEventListener('mousedown',   activate);
      el.addEventListener('mouseup',     deactivate);
      el.addEventListener('mouseleave',  deactivate);
    });
  }

  // ── Emulator ──
  function startGame() {
    const el = document.documentElement;
    const req = el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
    if (req) req.call(el).catch(()=>{});
    if (screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});

    const splash = document.getElementById('splash');
    splash.classList.add('hide');
    setTimeout(() => splash.remove(), 600);

    document.getElementById('emu-wrap').classList.add('active');
    document.getElementById('gamepad').classList.add('active');
    bindAll();
    mountEmulator();
  }

  function mountEmulator() {
    document.getElementById('game-container').innerHTML = '';
    document.querySelectorAll('script[src*="loader.js"]').forEach(s => s.remove());
    Object.keys(window).filter(k => k.startsWith('EJS_')||k==='EJS_emulator').forEach(k => { try{delete window[k];}catch(e){} });

    window.EJS_player          = '#game-container';
    window.EJS_core            = 'snes';
    window.EJS_gameUrl         = ROM_URL;
    window.EJS_pathtodata      = 'https://cdn.emulatorjs.org/stable/data/';
    window.EJS_startOnLoaded   = true;
    window.EJS_color           = '#e52521';
    window.EJS_backgroundColor = '#000000';
    window.EJS_language        = 'pt-BR';
    window.EJS_gameID          = 'smw';
    window.EJS_VirtualGamepad  = false;  // nossos controles
    window.EJS_Buttons         = { playPause:false, restart:false, mute:true, settings:false, fullscreen:false, saveState:true, loadState:true, screenRecord:false, gamepad:false, cheat:false, volume:true, saveSavFiles:true, loadSavFiles:true, quickSave:true, quickLoad:true };

    const s = document.createElement('script');
    s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js?v=' + Date.now();
    document.body.appendChild(s);
  }

  // NFC autoplay
  window.addEventListener('load', () => {
    if (new URLSearchParams(location.search).get('autoplay') === '1')
      setTimeout(() => document.getElementById('startBtn').click(), 300);
  });
</script>
</body>
</html>
